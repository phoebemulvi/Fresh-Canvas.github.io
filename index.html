<!DOCTYPE html>

<html>

<head>

  <title>My Shop</title>

  <style>

    body {

      font-family: Arial;

      background: linear-gradient(135deg, #ffe6f0, #e6f7ff);

      text-align: center;

      margin: 0;

      padding: 0;

    }

    h1 {

      margin-top: 60px;

      font-size: 40px;

    }

    .btn {

      background: #ff6fa5;

      color: white;

      padding: 12px 20px;

      border-radius: 20px;

      text-decoration: none;

      display: inline-block;

      margin-top: 20px;

    }

    .card {

      background: white;

      margin: 20px;

      padding: 20px;

      border-radius: 15px;

      display: inline-block;

      width: 200px;

    }

  </style>

</head>

<body>

  <h1>Your Canva Design Shop ✨</h1>

  <p>Aesthetic templates made with love</p>

  <a class="btn" href="#shop">Shop Now</a>

  <div style="height:800px;"></div>

  <div id="shop">

    <div class="card">Instagram Templates</div>

    <div class="card">Business Kits</div>

    <div class="card">School Designs</div>

  </div>

</body>

</body>

</html>
